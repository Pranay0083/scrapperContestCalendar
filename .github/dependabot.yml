version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    groups:
      express:
        patterns:
          - "express"
          - "cors"
          - "body-parser"
          - "morgan"
      database:
        patterns:
          - "mongodb"
          - "mongoose"
      scraping:
        patterns:
          - "cheerio"
          - "jsdom"
          - "selenium-webdriver"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
